eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka

spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: customer-service
              uri: lb://customer-service
              predicates:
                - Path=/api/customers/**
            - id: restaurant-service
              uri: lb://restaurant-service
              predicates:
                - Path=/api/restaurants/**
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/orders/**
            - id: delivery-service
              uri: lb://delivery-service
              predicates:
                - Path=/api/deliveries/**